<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOIRE Level Meter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}
.header {
  text-align: center;
  margin-bottom: 24px;
}
.header h1 {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 1px;
  color: #c0c0c0;
}
.meter-box {
  width: 85%;
  max-width: 380px;
  background: #16213e;
  border-radius: 12px;
  padding: 20px 24px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
}
.row {
  margin-bottom: 16px;
}
.label-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 12px;
  margin-bottom: 6px;
}
.label-row .name {
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: 700;
}
.label-row .db {
  font-weight: 700;
  font-size: 14px;
  color: #fff;
}
.bar-track {
  width: 100%;
  height: 12px;
  background: #0f0f23;
  border-radius: 6px;
  overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  width: 0%;
  border-radius: 6px;
  transition: width 30ms linear;
}
.peak-fill {
  background: linear-gradient(90deg, #00c853 0%, #ffd600 60%, #ff1744 100%);
}
.rms-fill {
  background: linear-gradient(90deg, #2979ff 0%, #00e5ff 100%);
}
.clip-indicator {
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  color: #ff1744;
  margin-top: 12px;
  padding: 6px 0;
  border-radius: 4px;
  background: rgba(255, 23, 68, 0.15);
  opacity: 0;
  transition: opacity 0.15s ease-out;
}
.clip-indicator.on {
  opacity: 1;
}
</style>
</head>
<body>

<div class="header">
  <h1>TOIRE Level Meter</h1>
</div>

<div class="meter-box">
  <div class="row">
    <div class="label-row">
      <span class="name" style="color: #ffd600;">PEAK</span>
      <span class="db" id="peak-db">-96.0 dB</span>
    </div>
    <div class="bar-track">
      <div id="peak-bar" class="bar-fill peak-fill"></div>
    </div>
  </div>

  <div class="row">
    <div class="label-row">
      <span class="name" style="color: #00e5ff;">RMS</span>
      <span class="db" id="rms-db">-96.0 dB</span>
    </div>
    <div class="bar-track">
      <div id="rms-bar" class="bar-fill rms-fill"></div>
    </div>
  </div>

  <div id="clip-indicator" class="clip-indicator">CLIP</div>
</div>

<script>
var peakDbEl   = document.getElementById('peak-db');
var rmsDbEl    = document.getElementById('rms-db');
var peakBarEl  = document.getElementById('peak-bar');
var rmsBarEl   = document.getElementById('rms-bar');
var clipEl     = document.getElementById('clip-indicator');

// Called by C++ via emitEventIfBrowserIsVisible("levelData", [peakDb, rmsDb])
// This is the JUCE 8 recommended C++ → JS pattern — no evaluateJavascript needed.
function updateLevels(peakDb, rmsDb) {
  peakDbEl.textContent = peakDb.toFixed(1) + ' dB';
  rmsDbEl.textContent  = rmsDb.toFixed(1)  + ' dB';

  var peakPct = Math.max(0, Math.min(100, ((peakDb + 96) / 96) * 100));
  var rmsPct  = Math.max(0, Math.min(100, ((rmsDb  + 96) / 96) * 100));
  peakBarEl.style.width = peakPct + '%';
  rmsBarEl.style.width  = rmsPct  + '%';

  if (peakDb >= -0.1) {
    clipEl.classList.add('on');
  } else {
    clipEl.classList.remove('on');
  }
}

// Register the JUCE event listener — C++ emits "levelData", we receive it.
// The payload is an array: [peakDb, rmsDb]
if (typeof __JUCE__ !== 'undefined' && __JUCE__.backend) {
  __JUCE__.backend.addEventListener('levelData', function(data) {
    // data is the var::Array from C++ emitEventIfBrowserIsVisible
    updateLevels(data[0], data[1]);
  });
} else {
  // Fallback: if running in a plain browser (development), poll a dummy
  console.log('__JUCE__ not found — running in browser dev mode');
  var dummyVal = -96;
  setInterval(function() {
    dummyVal = Math.min(0, dummyVal + 0.5);
    if (dummyVal >= 0) dummyVal = -96;
    updateLevels(dummyVal, dummyVal - 6);
  }, 100);
}
</script>

</body>
</html>
